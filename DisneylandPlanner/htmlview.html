<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Disneyland Trip Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide icons as React components are not available via CDN, so we use SVGs or fallback to emoji/icons -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F3E9D2;
      background-image: radial-gradient(circle, rgba(43,36,32,0.06) 1px, transparent 1px);
      background-size: 18px 18px;
    }
    .font-display { font-family: 'Bungee', cursive; }
    .font-ticket { font-family: 'Space Mono', monospace; }

    .marquee-lights {
      height: 12px;
      background-image: radial-gradient(circle, #F3E9D2 3.5px, transparent 4px);
      background-size: 26px 12px;
      background-repeat: repeat-x;
      background-position: center;
    }

    .ticket-stub {
      position: relative;
      border: 2px solid #2B2420;
      border-radius: 10px;
      background: #FBF6E9;
    }
    .ticket-stub::before {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 64px;
      width: 0;
      border-left: 2px dashed #C9952C;
    }
    .ticket-stub::after {
      content: '';
      position: absolute;
      left: 64px;
      top: -8px;
      width: 16px;
      height: 16px;
      background: #F3E9D2;
      border: 2px solid #2B2420;
      border-radius: 50%;
      transform: translateX(-9px);
    }
    .ticket-stub-bottom::before {
      content: '';
      position: absolute;
      left: 64px;
      bottom: -8px;
      width: 16px;
      height: 16px;
      background: #F3E9D2;
      border: 2px solid #2B2420;
      border-radius: 50%;
      transform: translateX(-9px);
    }

    .ticket-letter {
      font-family: 'Bungee', cursive;
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FBF6E9;
      font-size: 20px;
      border: 2px solid #2B2420;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

// Icon fallback helpers (since Lucide React icons are not available via CDN)
const Calendar = () => <span role="img" aria-label="calendar">📅</span>;
const Users = () => <span role="img" aria-label="users">👨‍👩‍👧‍👦</span>;
const Baby = () => <span role="img" aria-label="baby">👶</span>;
const Clock = () => <span role="img" aria-label="clock">⏰</span>;
const MapPin = () => <span role="img" aria-label="map">📍</span>;
const Utensils = () => <span role="img" aria-label="utensils">🍽️</span>;
const Star = () => <span role="img" aria-label="star">⭐</span>;
const ChevronDown = () => <span>▼</span>;
const ChevronUp = () => <span>▲</span>;

// Maps each attraction's intensity type to a classic Disneyland A-E ticket
// letter and its associated badge color, mirroring the real 1955-1982
// ticket book system (A = mildest, E = most thrilling).
const TICKET_LETTERS = {
  'Family': { letter: 'A', color: '#6B8F71' },
  'Family Thrill': { letter: 'C', color: '#C9952C' },
  'Adventure': { letter: 'C', color: '#C9952C' },
  'Thrill': { letter: 'D', color: '#BB2649' },
  'Epic': { letter: 'E', color: '#7A1530' }
};
const getTicket = (type) => TICKET_LETTERS[type] || { letter: 'B', color: '#4F7C82' };

function DisneylandTripPlanner() {
  const [startDate, setStartDate] = React.useState('');
  const [endDate, setEndDate] = React.useState('');
  const [adults, setAdults] = React.useState(2);
  const [children, setChildren] = React.useState(0);
  const [childAges, setChildAges] = React.useState([]);
  const [dailyParks, setDailyParks] = React.useState({});
  const [optimizeDay, setOptimizeDay] = React.useState(false);
  const [selectedDay, setSelectedDay] = React.useState('');
  const [expandedSchedule, setExpandedSchedule] = React.useState({});
  const [expandedDining, setExpandedDining] = React.useState({});
  const [schedules, setSchedules] = React.useState({});
  const [scheduleVersion, setScheduleVersion] = React.useState({});

  const parks = ['Disneyland Park', 'Disney California Adventure'];

  const attractions = {
    'Disneyland Park': [
      { name: 'Space Mountain', wait: '45-60 min', type: 'Thrill', height: '40"' },
      { name: 'Matterhorn Bobsleds', wait: '30-45 min', type: 'Thrill', height: '35"' },
      { name: 'Indiana Jones Adventure', wait: '60-75 min', type: 'Adventure', height: '46"' },
      { name: 'Pirates of the Caribbean', wait: '20-30 min', type: 'Family', height: 'Any' },
      { name: 'Haunted Mansion', wait: '25-35 min', type: 'Family', height: 'Any' },
      { name: 'Big Thunder Mountain', wait: '35-50 min', type: 'Family Thrill', height: '40"' },
      { name: 'Splash Mountain', wait: '40-55 min', type: 'Thrill', height: '40"' },
      { name: "It's a Small World", wait: '10-20 min', type: 'Family', height: 'Any' },
      { name: 'Star Wars: Rise of the Resistance', wait: '90-120 min', type: 'Epic', height: '40"' },
      { name: 'Millennium Falcon', wait: '45-60 min', type: 'Adventure', height: '38"' }
    ],
    'Disney California Adventure': [
      { name: 'Guardians of the Galaxy', wait: '60-80 min', type: 'Thrill', height: '40"' },
      { name: 'Incredicoaster', wait: '45-60 min', type: 'Thrill', height: '48"' },
      { name: "Soarin' Around the World", wait: '40-55 min', type: 'Family', height: '40"' },
      { name: 'Radiator Springs Racers', wait: '75-90 min', type: 'Family Thrill', height: '32"' },
      { name: "California Screamin'", wait: '35-50 min', type: 'Thrill', height: '48"' },
      { name: 'Toy Story Midway Mania', wait: '30-45 min', type: 'Family', height: 'Any' },
      { name: "Mickey's Fun Wheel", wait: '15-25 min', type: 'Family', height: 'Any' },
      { name: 'The Little Mermaid', wait: '20-30 min', type: 'Family', height: 'Any' },
      { name: 'Web Slingers', wait: '40-55 min', type: 'Family', height: '48"' },
      { name: 'Avengers Campus', wait: '25-35 min', type: 'Adventure', height: '40"' }
    ]
  };

  const diningLocations = {
    'Disneyland Park': [
      {
        name: 'Blue Bayou Restaurant',
        type: 'Fine Dining',
        cuisine: 'Creole/Cajun',
        popular: ['Bone-in Ribeye', 'Jambalaya', 'Monte Cristo Sandwich', 'Crème Brûlée']
      },
      {
        name: 'Carnation Cafe',
        type: 'Table Service',
        cuisine: 'American',
        popular: ["Loaded Baked Potato Soup", "Walt's Chili", "Fried Chicken", "Mickey Pancakes"]
      },
      {
        name: 'Docking Bay 7',
        type: 'Quick Service',
        cuisine: 'Star Wars Themed',
        popular: ['Fried Endorian Tip-Yip', 'Felucian Garden Spread', 'Blue Bantha Cookie']
      },
      {
        name: 'Plaza Inn',
        type: 'Quick Service',
        cuisine: 'American',
        popular: ['Famous Fried Chicken', 'Pot Roast', 'Chocolate Cake', 'Apple Pie']
      }
    ],
    'Disney California Adventure': [
      {
        name: 'Carthay Circle Restaurant',
        type: 'Fine Dining',
        cuisine: 'California Modern',
        popular: ['Pan-seared Salmon', 'Crispy Pork Belly', 'Carthay Signature Old Fashioned']
      },
      {
        name: 'Lamplight Lounge',
        type: 'Casual Dining',
        cuisine: 'California Cuisine',
        popular: ['Lobster Roll', 'Crab Nachos', 'Piggy Wings', 'Potato Skins']
      },
      {
        name: 'Pym Test Kitchen',
        type: 'Quick Service',
        cuisine: 'Marvel Themed',
        popular: ['Quantum Pretzel', 'Pym-ini Sandwich', 'Not So Little Chicken Sandwich']
      }
    ]
  };

  // Helper to generate date range (memoized so it only recalculates when the
  // actual start/end dates change, instead of returning a new array on every render)
  const dateRange = React.useMemo(() => {
    if (!startDate || !endDate) return [];
    const start = new Date(startDate);
    const end = new Date(endDate);
    const range = [];
    let current = new Date(start);
    while (current <= end) {
      range.push(current.toISOString().split('T')[0]);
      current.setDate(current.getDate() + 1);
    }
    return range;
  }, [startDate, endDate]);

  // Handle child ages
  React.useEffect(() => {
    setChildAges(Array(children).fill(''));
  }, [children]);

  // Handle park selection for each day
  const handleParkSelection = (date, park) => {
    setDailyParks(prev => ({ ...prev, [date]: park }));
  };

  // Toggle schedule expansion
  const toggleScheduleExpansion = (date) => {
    setExpandedSchedule(prev => ({ ...prev, [date]: !prev[date] }));
  };

  // Toggle dining expansion
  const toggleDiningExpansion = (location) => {
    setExpandedDining(prev => ({ ...prev, [location]: !prev[location] }));
  };

  // Generate a simple schedule for a park and date
  const generateSchedule = (park, date) => {
    const rides = attractions[park] || [];
    const shuffled = [...rides].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, 5).map((ride, idx) => ({
      ...ride,
      time: `${9 + idx}:00 AM`
    }));
  };

  // Generate schedules for all days
  React.useEffect(() => {
    if (!optimizeDay || dateRange.length === 0) return;
    const newSchedules = {};
    dateRange.forEach(date => {
      const park = dailyParks[date];
      if (park) {
        newSchedules[date] = generateSchedule(park, date);
      }
    });
    setSchedules(newSchedules);
  }, [optimizeDay, dateRange, dailyParks]);

  return (
    <div className="min-h-screen p-4 md:p-8">
      <div className="max-w-4xl mx-auto bg-[#FBF6E9] rounded-2xl shadow-xl overflow-hidden border-2 border-[#2B2420]">

        {/* Marquee Header */}
        <div className="bg-[#BB2649] pt-3">
          <div className="marquee-lights"></div>
          <div className="px-6 py-8 text-center">
            <p className="font-ticket text-[#F3E9D2] tracking-[0.3em] text-xs mb-3">ADMIT ONE · FAMILY ITINERARY</p>
            <h1 className="font-display text-2xl md:text-4xl text-[#F3E9D2] leading-snug flex items-center justify-center gap-3">
              <MapPin /> Disneyland Trip Planner
            </h1>
          </div>
          <div className="marquee-lights"></div>
        </div>

        <div className="p-6 md:p-10">

        {/* Trip Details */}
        <div className="grid md:grid-cols-2 gap-6 mb-10">
          <div>
            <label className="block mb-2 font-semibold text-[#2B2420] flex items-center gap-1"><Calendar /> Start Date</label>
            <input type="date" className="w-full border-2 border-[#2B2420] rounded-lg p-2 font-ticket bg-white focus:outline-none focus:ring-2 focus:ring-[#C9952C]" value={startDate} onChange={e => setStartDate(e.target.value)} />
          </div>
          <div>
            <label className="block mb-2 font-semibold text-[#2B2420] flex items-center gap-1"><Calendar /> End Date</label>
            <input type="date" className="w-full border-2 border-[#2B2420] rounded-lg p-2 font-ticket bg-white focus:outline-none focus:ring-2 focus:ring-[#C9952C]" value={endDate} onChange={e => setEndDate(e.target.value)} />
          </div>
          <div>
            <label className="block mb-2 font-semibold text-[#2B2420] flex items-center gap-1"><Users /> Adults</label>
            <input type="number" min="1" className="w-full border-2 border-[#2B2420] rounded-lg p-2 font-ticket bg-white focus:outline-none focus:ring-2 focus:ring-[#C9952C]" value={adults} onChange={e => setAdults(Number(e.target.value))} />
          </div>
          <div>
            <label className="block mb-2 font-semibold text-[#2B2420] flex items-center gap-1"><Baby /> Children</label>
            <input type="number" min="0" className="w-full border-2 border-[#2B2420] rounded-lg p-2 font-ticket bg-white focus:outline-none focus:ring-2 focus:ring-[#C9952C]" value={children} onChange={e => setChildren(Number(e.target.value))} />
            {children > 0 && (
              <div className="mt-2 space-y-2">
                {Array.from({ length: children }).map((_, idx) => (
                  <input
                    key={idx}
                    type="number"
                    min="0"
                    max="17"
                    placeholder={`Child ${idx + 1} Age`}
                    className="w-full border-2 border-[#2B2420] rounded-lg p-2 font-ticket bg-white focus:outline-none focus:ring-2 focus:ring-[#C9952C]"
                    value={childAges[idx] || ''}
                    onChange={e => {
                      const ages = [...childAges];
                      ages[idx] = e.target.value;
                      setChildAges(ages);
                    }}
                  />
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Park Selection */}
        {dateRange.length > 0 && (
          <div className="mb-10">
            <h2 className="font-display text-lg text-[#BB2649] mb-4 flex items-center gap-2"><MapPin /> Select Park for Each Day</h2>
            <div className="grid md:grid-cols-2 gap-4">
              {dateRange.map((date, idx) => (
                <div key={date} className={`ticket-stub p-4 pl-20 flex items-center justify-between ${idx % 2 === 0 ? '-rotate-1' : 'rotate-1'}`}>
                  <div>
                    <div className="font-ticket text-sm font-bold text-[#2B2420]">{date}</div>
                  </div>
                  <div>
                    <select
                      className="border-2 border-[#2B2420] rounded-lg p-2 bg-white font-medium focus:outline-none focus:ring-2 focus:ring-[#C9952C]"
                      value={dailyParks[date] || ''}
                      onChange={e => handleParkSelection(date, e.target.value)}
                    >
                      <option value="">Select Park</option>
                      {parks.map(park => (
                        <option key={park} value={park}>{park}</option>
                      ))}
                    </select>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Optimize Button */}
        {dateRange.length > 0 && Object.values(dailyParks).filter(Boolean).length === dateRange.length && (
          <div className="mb-10 text-center">
            <button
              className="font-display bg-[#2F4A3E] text-[#F3E9D2] px-8 py-3 rounded-lg text-sm tracking-wide shadow-md hover:bg-[#23362c] transition border-2 border-[#2B2420]"
              onClick={() => setOptimizeDay(true)}
            >
              <Clock /> Optimize My Disney Days!
            </button>
          </div>
        )}

        {/* Schedules */}
        {optimizeDay && (
          <div className="mb-10">
            <h2 className="font-display text-lg text-[#BB2649] mb-4 flex items-center gap-2"><Clock /> Daily Schedules</h2>
            {dateRange.map(date => (
              <div key={date} className="mb-6">
                <div
                  className="flex items-center justify-between cursor-pointer bg-[#2F4A3E] text-[#F3E9D2] p-4 rounded-lg border-2 border-[#2B2420]"
                  onClick={() => toggleScheduleExpansion(date)}
                >
                  <div>
                    <span className="font-ticket font-bold">{date}</span>
                    <span className="ml-2 opacity-80">{dailyParks[date]}</span>
                  </div>
                  {expandedSchedule[date] ? <ChevronUp /> : <ChevronDown />}
                </div>
                {expandedSchedule[date] && schedules[date] && (
                  <div className="bg-[#FBF6E9] border-2 border-t-0 border-[#2B2420] rounded-b-lg p-4 mt-0">
                    <ul className="space-y-3">
                      {schedules[date].map((ride, idx) => {
                        const ticket = getTicket(ride.type);
                        return (
                          <li key={idx} className="flex items-center gap-3 bg-white rounded-lg border-2 border-[#2B2420] p-3">
                            <div className="ticket-letter" style={{ backgroundColor: ticket.color }}>{ticket.letter}</div>
                            <div className="flex-1">
                              <div className="font-semibold text-[#2B2420]">{ride.name}</div>
                              <div className="font-ticket text-xs text-[#2B2420] opacity-70">{ride.time} · {ride.wait} wait · {ride.type} · Height: {ride.height}</div>
                            </div>
                          </li>
                        );
                      })}
                    </ul>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* Dining Recommendations */}
        <div className="mb-10 bg-[#EFE3C5] p-6 rounded-xl border-2 border-[#2B2420]">
          <h2 className="font-display text-lg text-[#BB2649] mb-5 flex items-center gap-2">
            <Utensils />
            Dining Recommendations
          </h2>
          {parks.map((park) => (
            <div key={park} className="mb-6 last:mb-0">
              <h3 className="font-ticket font-bold text-sm tracking-wide mb-3 text-[#2B2420] uppercase">{park}</h3>
              <div className="grid md:grid-cols-2 gap-4">
                {diningLocations[park]?.map((location) => {
                  const isExpanded = expandedDining[location.name];
                  return (
                    <div key={location.name} className="ticket-stub ticket-stub-bottom overflow-hidden">
                      <div 
                        className="p-4 pl-20 cursor-pointer hover:bg-[#F3E9D2] transition-colors"
                        onClick={() => toggleDiningExpansion(location.name)}
                      >
                        <div className="flex justify-between items-start">
                          <div className="flex-1">
                            <h4 className="font-semibold text-[#2B2420]">{location.name}</h4>
                            <p className="font-ticket text-xs text-[#2B2420] opacity-70 mt-1">{location.type} · {location.cuisine}</p>
                          </div>
                          {isExpanded ? <ChevronUp /> : <ChevronDown />}
                        </div>
                      </div>
                      
                      {isExpanded && (
                        <div className="px-4 pb-4 pl-20 border-t-2 border-dashed border-[#C9952C]">
                          <h5 className="font-semibold text-[#2B2420] mb-2 mt-3 text-sm">Popular Items</h5>
                          <ul className="font-ticket text-xs text-[#2B2420] space-y-1.5">
                            {location.popular.map((item, index) => (
                              <li key={index} className="flex items-center gap-2">
                                <Star />
                                {item}
                              </li>
                            ))}
                          </ul>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>

        {/* Summary */}
        {dateRange.length > 0 && (
          <div className="bg-[#2F4A3E] p-6 md:p-8 rounded-xl border-2 border-[#2B2420]">
            <h2 className="font-display text-lg text-[#F3E9D2] mb-5">Trip Summary</h2>
            <div className="grid md:grid-cols-3 gap-4 text-center">
              <div className="bg-[#FBF6E9] p-4 rounded-lg border-2 border-[#2B2420]">
                <div className="font-display text-2xl text-[#BB2649]">{dateRange.length}</div>
                <div className="font-ticket text-xs text-[#2B2420] mt-1 uppercase">Days at Disney</div>
              </div>
              <div className="bg-[#FBF6E9] p-4 rounded-lg border-2 border-[#2B2420]">
                <div className="font-display text-2xl text-[#BB2649]">{adults + children}</div>
                <div className="font-ticket text-xs text-[#2B2420] mt-1 uppercase">Total Guests</div>
              </div>
              <div className="bg-[#FBF6E9] p-4 rounded-lg border-2 border-[#2B2420]">
                <div className="font-display text-2xl text-[#BB2649]">
                  {Object.values(dailyParks).filter(park => park === 'Disneyland Park').length + 
                   Object.values(dailyParks).filter(park => park === 'Disney California Adventure').length}
                </div>
                <div className="font-ticket text-xs text-[#2B2420] mt-1 uppercase">Park Days Planned</div>
              </div>
            </div>
            {optimizeDay && (
              <div className="mt-5 p-4 bg-[#C9952C] rounded-lg border-2 border-[#2B2420]">
                <p className="font-ticket text-xs text-[#2B2420] text-center leading-relaxed">
                  ✨ Your optimized schedules are ready! Each day includes strategic ride timing, 
                  dining recommendations, and break periods for the ultimate Disney experience.
                </p>
              </div>
            )}
          </div>
        )}
        </div>
      </div>
    </div>
  );
}

// Render the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<DisneylandTripPlanner />);

  </script>
</body>
</html>
